# Goreleaser configuration for VibeScanner
# Build and release to GitHub

version: 2

before:
  hooks:
    # Ensure web dashboard is built before releasing
    - cd web && npm install && npm run build
    # Tidy Go modules
    - go mod tidy

builds:
  - id: vibescanner
    binary: vibescanner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: vibescanner
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: vibescanner
    name: vibescanner
  draft: true
  prerelease: auto

# Homebrew tap
brews:
  - name: vibescanner
    homepage: https://github.com/vibescanner/vibescanner
    description: "🔍 Code health scanner for vibe coders"
    license: "MIT"
    repository:
      owner: vibescanner
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    dependencies:
      - name: semgrep
        type: optional
